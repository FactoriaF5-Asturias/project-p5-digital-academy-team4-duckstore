<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Catálogo de Productos - Duckstore</title>
        <link rel="stylesheet" href="./styles/catalogstyles.css">
    </head>
<body> 
    <header>
    </header>
    <main>
        <h1 class="explore-ducks">Explore Ducks</h1>
    <section class="catalogo">
        <article class="patos">
            <img src="assets/img/classicduck.png"
            alt="Pato Clasico">
            <div class="info">
            <h2 class="titulo">Pato clásico</h2>
            <p class="descripcion">Pato fiable de toda la vida no falla</p> 
            <span class="precio">3,99€</span>
            <button class="add-to-cart">Añadir al carrito</button>
            </div>
            </article>
        <article class="patos">
            <img src="assets/img/astroduck.png"
            alt="Pato Espacial">
            <div class="info">
            <h2 class="titulo">Pato Espacial</h2>
            <p class="descripcion">Pato astronauta muy majete</p>
            <span class="precio">19,69€</span>
            <button class="add-to-cart">Añadir al carrito</button>
            </div>
        </article>
        <article class="patos">
            <img src="assets/img/evilduck.png"
            alt="Pato Maleante">
            <div class="info">
            <h2 class="titulo">Pato Maleante</h2>
            <p class="descripcion">Pato que es muy malo para gente maquiavelica</p>
            <span class="precio">6,66€</span>
            <button class="add-to-cart">Añadir al carrito</button>  
            </div>
        </article>
        <article class="patos">
            <img src="assets/img/pirateduck.png"
            alt="Pato Pirata">
            <div class="info">
            <h2 class="titulo">Pato Pirata</h2>
            <p class="descripcion">Pato que no cree en el copyright </p>
            <span class="precio">100€</span>
            </div>
        </article>
    </section>
    </main>
    </body>
</html>
