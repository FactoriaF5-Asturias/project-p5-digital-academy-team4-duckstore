<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Patos - Duckstore</title>
    <link rel="stylesheet" href="./styles/catalogstyles.css">
</head>

<body>
    <header>
    </header>
    <main>

        <h1 class="explore-ducks">Nuestros patos</h1>
        <nav class="filters" aria-label="Filtrar por categoría">
            <button type="button" class="filters__btn is-active" data-filter="all">Todos</button>
            <button type="button" class="filters__btn" data-filter="clasicos">Clásicos</button>
            <button type="button" class="filters__btn" data-filter="aventureros">Aventureros</button>
            <button type="button" class="filters__btn" data-filter="villanos">Villanos</button>

        </nav>
        <section class="catalogo" id="catalogo" aria-live="polite">
        </section>
    </main>
    <script type="module" src="./js/catalog.js"></script>
</body>

</html>
